version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: schema-registry
    - file_option: java_package_prefix
      value: com.github.cgund98.schemaregistry
plugins:
  - remote: buf.build/protocolbuffers/python
    out: python/schema_registry
    opt:
      - pyi_out=python/schema_registry
  - local: bin/protoc-gen-python-dto
    out: python/schema_registry
  - remote: buf.build/protocolbuffers/go
    out: go
    opt: paths=source_relative
  - local: bin/protoc-gen-go-events
    out: go
  - remote: buf.build/protocolbuffers/java
    out: kotlin/lib/build/generated/buf
  - remote: buf.build/protocolbuffers/kotlin
    out: kotlin/lib/build/generated/buf
  - local: bin/protoc-gen-kotlin-events
    out: kotlin/lib/build/generated/buf