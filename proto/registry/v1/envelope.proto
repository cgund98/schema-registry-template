edition = "2023";

package registry.v1;

import "google/protobuf/descriptor.proto";
import "google/protobuf/timestamp.proto";

option features.field_presence = IMPLICIT;
option java_package = "com.github.cgund98.schemaregistry.registry.v1";

extend google.protobuf.MessageOptions {
  string event_type = 50001;
}

extend google.protobuf.FieldOptions {
  bool is_aggregate_id = 50002;
}

// Structured CloudEvents envelope
// https://github.com/cloudevents/spec/blob/main/cloudevents/formats/cloudevents.proto
message Envelope {
  string id = 1;
  string source = 2;
  string specversion = 3; // "1.0"
  string type = 4;

  // Use a map for extensibility (correlation_id, etc.)
  map<string, CloudEventAttributeValue> attributes = 5;

  oneof data_oneof {
    bytes binary_data = 6;
    string text_data = 7;
    // You can also use google.protobuf.Any here for direct proto support
  }

  google.protobuf.Timestamp time = 8;
}

message CloudEventAttributeValue {
  oneof attr {
    bool ce_boolean = 1;
    int32 ce_integer = 2;
    string ce_string = 3;
    bytes ce_bytes = 4;
    string ce_uri = 5;
    string ce_uri_reference = 6;
    google.protobuf.Timestamp ce_timestamp = 7;
  }
}
